<div class="auth-page">
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="left-content">
      <img src="studymate-logo.pdf" alt="StudyMate" class="logo-img" onerror="this.style.display='none'" />
      <h1 class="brand-name">StudyMate AI</h1>
      <p class="brand-tagline">Your smart AI-powered study companion. Upload PDFs, ask questions, generate quizzes and
        track your learning progress.</p>
      <div class="feature-pills">
        <span class="pill">📄 PDF Upload</span>
        <span class="pill">🤖 AI Q&amp;A</span>
        <span class="pill">📝 Quiz Generator</span>
        <span class="pill">📊 Analytics</span>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to continue learning</p>
      </div>

      @if(error) {
      <div class="error-msg">{{ error }}</div>
      }

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="you@example.com" (keyup.enter)="submit()" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="submit()" />
      </div>

      <button class="submit-btn" (click)="submit()" [disabled]="!email || !password || loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>

      <p class="switch-link">Don't have an account? <a routerLink="/signup">Sign up</a></p>
    </div>
  </div>
</div>
